name: Format

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  format:
    name: Prettier check
    runs-on: ubuntu-latest

    # Write permission needed to push the auto-format commit back
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the head ref so we push back to the correct branch on PRs
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format with Prettier
        run: bunx prettier --write "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Detect formatting changes
        id: format_changes
        run: |
          # Stage only tracked file updates/deletions to avoid committing unrelated untracked files.
          git add -u
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No formatting changes."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit formatted files
        if: steps.format_changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "style: auto-format with prettier [skip ci]"
          git push
