name: Format

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  format:
    name: Prettier check
    runs-on: ubuntu-latest

    # Write permission needed to push the auto-format commit back
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the head ref so we push back to the correct branch on PRs
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format with Prettier
        run: bunx prettier --write "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Commit formatted files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-format with prettier [skip ci]"
            git push
          else
            echo "No formatting changes."
          fi
